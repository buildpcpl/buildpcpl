<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kontakt | BuildPC</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="icon" type="image/x-icon" href="buildpc_favicon.ico">
    <link href="https://fonts.googleapis.com/css?family=Quicksand" rel="stylesheet">

    <!-- EmailJS SDK -->
    <script type="text/javascript" src="https://cdn.emailjs.com/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("umOor72qRHOf8d_7O"); // <--- Wstaw swój PUBLIC KEY
        })();
    </script>
</head>
<body>
    <header class="header">
        <a href="index.html" class="logo-link">
            <img src="buildpc_logo.png" alt="BuildPC Logo" class="logo-small">
        </a>
        <nav class="nav">
            <a href="index.html">Strona główna</a>
            <a href="cennik.html">Cennik</a>
            <a href="kontakt.html" class="active">Kontakt</a>
            <a href="wycena.html">Wycena</a>
        </nav>
    </header>

    <main class="contact-wrapper">
        <form id="contact-form" class="contact-form">
            <center><img src="buildpc_logo.png" alt="BuildPC Logo" class="logo-small"></center>
            <h1>Skontaktuj się z nami</h1>

            <label for="name">Imię i nazwisko</label>
            <input type="text" id="name" name="name" required>

            <label for="email">Adres e-mail</label>
            <input type="email" id="email" name="email" required>

            <label for="message">Wiadomość</label>
            <textarea id="message" name="message" rows="5" required></textarea>

            <button type="submit">Wyślij</button>

            <div class="social-links">
                <a href="https://www.tiktok.com/@buildpc.pl" target="_blank" class="icon tiktok">
                    <img src="tiktok.svg" alt="TikTok" class="social-icon">
                </a>
                <a href="https://www.instagram.com/buildpc.pl" target="_blank" class="icon instagram">
                    <img src="instagram.svg" alt="Instagram" class="social-icon">
                </a>
                <a href="mailto:kontakt.buildpc@gmail.com" class="icon email">
                    <img src="mail1.svg" alt="Email" class="social-icon">
                </a>
            </div>
        </form>

        
    </main>

    <!-- EmailJS formularz handler -->
    <script>
        document.getElementById("contact-form").addEventListener("submit", function(e) {
            e.preventDefault();

            emailjs.sendForm("service_pk66unl", "template_4hdryod", this)
                .then(function(response) {
                    alert("Wiadomość została wysłana!");
                }, function(error) {
                    alert("Wystąpił błąd: " + JSON.stringify(error));
                });

            this.reset(); // czyści formularz po wysłaniu
        });
    </script>
    
</body>
</html>
